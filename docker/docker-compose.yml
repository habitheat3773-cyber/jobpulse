version: "3.8"

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: jobpulse_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: jobpulse
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-jobpulse_secure_pass}
      MONGO_INITDB_DATABASE: jobpulse_india
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - jobpulse_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobpulse_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://jobpulse:${MONGO_PASSWORD:-jobpulse_secure_pass}@mongodb:27017/jobpulse_india?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - jobpulse_net
    volumes:
      - ./backend/logs:/app/logs

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobpulse_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - jobpulse_net

volumes:
  mongo_data:

networks:
  jobpulse_net:
    driver: bridge
